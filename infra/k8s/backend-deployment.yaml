apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mastery-hub
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mastery-hub
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mastery-hub
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mastery-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mastery-hub/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mastery-hub-config
            - secretRef:
                name: mastery-hub-secrets
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:27017
          resources:
            requests:
              memory: 128Mi
              cpu: 250m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
