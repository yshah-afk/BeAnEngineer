services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mastery_hub
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: mastery_hub
      CONTENT_DIR: /content
    volumes:
      - ../content:/content:ro
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ai

volumes:
  mongodb_data:
  ollama_data:
